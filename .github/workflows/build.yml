name: Build OpenWrt for HC-EN101

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version tag'
        required: true
        default: 'v24.10.2'
      debug:
        description: 'Enable debug build (V=s)'
        required: false
        default: 'false'
  push:
    paths:
      - 'config/**'
      - 'files/**'
      - 'patches/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || 'v24.10.2' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip \
            zlib1g-dev file wget xsltproc subversion patch sudo time

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} \
            https://github.com/openwrt/openwrt.git openwrt-src

      - name: Apply HC-EN101 device patches
        run: |
          chmod +x scripts/apply-patches.sh
          bash scripts/apply-patches.sh openwrt-src

      - name: Update feeds
        working-directory: openwrt-src
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        working-directory: openwrt-src
        run: |
          make defconfig
          echo "=== Selected device ==="
          grep -i "DEVICE" .config | grep -v "^#"
          echo "=== Target ==="
          grep "CONFIG_TARGET" .config | grep -v "^#"

      - name: Download sources
        working-directory: openwrt-src
        run: |
          make download -j$(nproc)

      - name: Build firmware
        working-directory: openwrt-src
        run: |
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            make -j$(nproc) V=s || make -j1 V=s
          else
            make -j$(nproc) V=w || make -j1 V=s
          fi

      - name: Organize output
        if: always()
        run: |
          mkdir -p output
          if [ -d "openwrt-src/bin/targets/layerscape" ]; then
            find openwrt-src/bin/targets/layerscape/ -type f \
              $ -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" $ \
              -exec cp -v {} output/ \;
          fi
          ls -la output/ 2>/dev/null || echo "No output files found"

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-hc-en101-firmware
          path: output/
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt-src/logs/
            openwrt-src/tmp/
          retention-days: 7

      - name: Generate build info
        if: always()
        run: |
          cat > output/BUILD_INFO.txt << 'EOF'
          Build Date: $(date -u)
          OpenWrt Version: ${{ env.OPENWRT_VERSION }}
          Target: layerscape/armv8_64b
          Device: HC-EN101 (Huaichen Telecom / TE1104H0)
          SoC: NXP LS1012A
          Flash: QSPI NOR
          Runner: ${{ runner.os }} ${{ runner.name }}
          EOF
          cat output/BUILD_INFO.txt
